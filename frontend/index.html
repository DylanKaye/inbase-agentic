<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pairing Analyzer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap');
    
    :root {
      --primary-color: #00a8ff;
      --secondary-color: #0066cc;
      --background-color: #001832;
      --text-color: #80c7ff;
      --grid-color: rgba(0, 168, 255, 0.1);
      --accent: #64ffda;
    }

    body { 
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      margin: 0; 
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(90deg, rgba(0,24,50,0.95) 0%, rgba(0,24,50,0.8) 100%),
        repeating-linear-gradient(0deg, var(--grid-color) 0px, var(--grid-color) 1px, transparent 1px, transparent 50px),
        repeating-linear-gradient(90deg, var(--grid-color) 0px, var(--grid-color) 1px, transparent 1px, transparent 50px);
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: rgba(0,24,50,0.8);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid var(--primary-color);
      box-shadow: 0 0 20px rgba(0,168,255,0.1);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 30px;
      position: relative;
    }

    .input-section {
      flex: 2;
    }

    .history-section {
      flex: 1;
      border-left: 2px solid rgba(100,255,218,0.2);
      padding-left: 30px;
      position: relative;
      min-width: 300px;
      max-width: 500px;
    }

    /* Data controls panel */
    .data-controls {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid rgba(0,168,255,0.3);
      border-radius: 8px;
      background: rgba(0,24,50,0.6);
    }

    .data-controls label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .data-controls input[type="date"],
    .data-controls input[type="number"] {
      padding: 8px 12px;
      border: 1px solid var(--primary-color);
      border-radius: 6px;
      background: rgba(0,24,50,0.9);
      color: var(--text-color);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
    }

    .data-controls input[type="date"]:focus,
    .data-controls input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(100,255,218,0.2);
    }

    .data-controls input[type="number"] {
      width: 70px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .status-badge.no-data {
      background: rgba(255,100,100,0.15);
      border: 1px solid rgba(255,100,100,0.4);
      color: #ff8a80;
    }

    .status-badge.loaded {
      background: rgba(100,255,218,0.15);
      border: 1px solid rgba(100,255,218,0.4);
      color: var(--accent);
    }

    .status-badge.loading {
      background: rgba(255,193,7,0.15);
      border: 1px solid rgba(255,193,7,0.4);
      color: #ffd54f;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-badge.no-data .status-dot { background: #ff8a80; }
    .status-badge.loaded .status-dot { background: var(--accent); animation: pulse 2s infinite; }
    .status-badge.loading .status-dot { background: #ffd54f; animation: pulse 0.8s infinite; }

    .data-summary {
      font-size: 13px;
      color: rgba(128,199,255,0.7);
      margin-bottom: 15px;
      padding: 10px 14px;
      border-left: 3px solid var(--accent);
      background: rgba(100,255,218,0.05);
      border-radius: 0 6px 6px 0;
      display: none;
    }

    .data-summary.visible { display: block; }

    textarea {
      width: 100%;
      height: 100px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid var(--primary-color);
      border-radius: 8px;
      font-size: 16px;
      background-color: rgba(0,24,50,0.9);
      color: var(--text-color);
      font-family: 'Rajdhani', sans-serif;
      resize: none;
      transition: all 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(100,255,218,0.2);
    }

    textarea:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button {
      font-size: 16px;
      padding: 12px 30px;
      background-color: transparent;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover:not(:disabled) {
      background-color: rgba(0,168,255,0.1);
      box-shadow: 0 0 15px var(--primary-color);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(100,255,218,0.2), transparent);
      transition: 0.5s;
    }

    button:hover:not(:disabled)::before {
      left: 100%;
    }

    .btn-fetch {
      color: var(--accent);
      border-color: var(--accent);
      font-size: 14px;
      padding: 8px 20px;
    }

    .btn-fetch:hover:not(:disabled) {
      box-shadow: 0 0 15px rgba(100,255,218,0.3);
    }

    #output {
      margin-top: 20px;
      background-color: rgba(10,25,47,0.6);
      padding: 20px;
      border: 1px solid rgba(100,255,218,0.2);
      border-radius: 8px;
      white-space: pre-wrap;
      max-height: 350px;
      overflow-y: auto;
      word-wrap: break-word;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    #chatHistory {
      max-height: 600px;
      overflow-y: auto;
      padding: 15px;
      word-wrap: break-word;
    }

    .chat-entry {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(100,255,218,0.2);
      position: relative;
      width: 100%;
    }

    .chat-entry::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 0;
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent), transparent);
    }

    .command {
      color: var(--accent);
      font-weight: 600;
      padding-left: 20px;
      position: relative;
    }

    .command::before {
      content: '?';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .response {
      margin-top: 10px;
      color: #8892b0;
      padding-left: 20px;
      white-space: pre-wrap;
      width: 100%;
      box-sizing: border-box;
    }

    .timestamp {
      font-size: 0.8em;
      color: rgba(100,255,218,0.6);
      margin-bottom: 8px;
    }

    h1, h2 {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      position: relative;
      display: inline-block;
    }

    h1 { font-size: 1.6em; }

    h1::after, h2::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, var(--accent), transparent);
    }

    em {
      color: var(--accent);
      font-style: normal;
      border-bottom: 1px dotted var(--accent);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(10,25,47,0.8); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(100,255,218,0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,255,218,0.5); }

    /* Particles */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--primary-color);
      border-radius: 50%;
      animation: particleFloat 20s infinite linear;
    }

    @keyframes particleFloat {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Globe */
    .globe-container {
      position: absolute;
      top: 270px; right: 20px;
      width: 100px; height: 100px;
      perspective: 1000px;
    }

    .globe {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: globeRotate 20s infinite linear;
    }

    .globe::before {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      border: 2px dotted rgba(100,255,218,0.3);
      border-radius: 50%;
      animation: globePulse 4s infinite ease-in-out;
    }

    .globe::after {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 30%, rgba(100,255,218,0.1), transparent);
      border-radius: 50%;
    }

    @keyframes globeRotate {
      0%   { transform: rotateY(0deg) rotateX(30deg); }
      100% { transform: rotateY(360deg) rotateX(30deg); }
    }

    @keyframes globePulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    /* Radar */
    .radar {
      position: absolute;
      top: 380px; right: 20px;
      width: 150px; height: 150px;
      border-radius: 50%;
      background: rgba(0,24,50,0.9);
      border: 2px solid var(--primary-color);
      overflow: hidden;
    }

    .radar-beam {
      position: absolute;
      width: 50%; height: 50%;
      background: linear-gradient(45deg, var(--primary-color), transparent);
      transform-origin: 100% 100%;
      animation: radarScan 4s infinite linear;
    }

    @keyframes radarScan {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Flight paths */
    .flight-paths {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .flight-path {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(100,255,218,0.3), transparent);
      animation: flightPathMove 8s infinite linear;
    }

    @keyframes flightPathMove {
      0%   { transform: translateX(-100%) translateY(100%); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: translateX(200%) translateY(-100%); opacity: 0; }
    }

    /* Holographic overlay */
    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        repeating-linear-gradient(90deg, rgba(100,255,218,0.03) 0px, rgba(100,255,218,0.03) 1px, transparent 1px, transparent 30px),
        repeating-linear-gradient(0deg, rgba(100,255,218,0.03) 0px, rgba(100,255,218,0.03) 1px, transparent 1px, transparent 30px);
      pointer-events: none;
    }

    /* Status bar */
    .status-bar {
      position: absolute;
      top: 20px; left: 20px;
      display: flex; gap: 20px;
      font-family: monospace;
      font-size: 0.8em;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-led {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: ledPulse 2s infinite;
    }

    @keyframes ledPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Classified stamp */
    .classified {
      position: absolute;
      top: 20px; right: 20px;
      transform: rotate(-15deg);
      font-family: 'Courier New', monospace;
      font-size: 1.2em;
      color: rgba(100,255,218,0.6);
      border: 2px solid rgba(100,255,218,0.6);
      padding: 5px 15px;
      text-transform: uppercase;
      pointer-events: none;
      background: rgba(0,24,50,0.8);
      z-index: 2;
      box-shadow: 0 0 10px rgba(100,255,218,0.2);
    }

    .tech-decoration {
      position: absolute;
      font-family: monospace;
      color: rgba(100,255,218,0.1);
      pointer-events: none;
      user-select: none;
    }

    .tech-decoration-1 { top: 20px; right: 20px; }
    .tech-decoration-2 { bottom: 20px; left: 20px; }

    .example-questions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-q {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid rgba(0,168,255,0.3);
      border-radius: 12px;
      color: rgba(128,199,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0;
      text-transform: none;
    }

    .example-q:hover {
      color: var(--primary-color);
      border-color: var(--primary-color);
      background: rgba(0,168,255,0.1);
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(100,255,218,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Server status */
    .server-status {
      position: absolute;
      right: 20px; top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .server {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary-color);
      font-family: monospace;
      font-size: 12px;
    }

    .server-indicator {
      width: 12px; height: 12px;
      background: var(--primary-color);
      animation: serverPulse 1.5s infinite;
    }

    @keyframes serverPulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="tech-decoration tech-decoration-1">PAIRING.ANALYZER_[1.0]</div>
  <div class="tech-decoration tech-decoration-2">DATA.PIPELINE.ACTIVE</div>
  
  <div class="particles"></div>
  
  <div class="globe-container">
    <div class="globe"></div>
  </div>
  
  <div class="radar">
    <div class="radar-beam"></div>
  </div>
  
  <div class="flight-paths"></div>
  
  <div class="status-bar">
    <div class="status-item"><div class="status-led"></div>RAIDO_LINK</div>
    <div class="status-item"><div class="status-led"></div>AI_ENGINE</div>
    <div class="status-item"><div class="status-led"></div>DATA_PIPE</div>
  </div>

  <div class="classified">Pairing Intel</div>

  <div class="container">
    <div class="input-section">
      <h1>Pairing Analyzer</h1>

      <!-- Data fetch controls -->
      <div class="data-controls">
        <div>
          <label>Start Date</label>
          <input type="date" id="startDate">
        </div>
        <div>
          <label>End Date</label>
          <input type="date" id="endDate">
        </div>
        <div>
          <label>Or Days</label>
          <input type="number" id="numDays" value="30" min="1" max="90">
        </div>
        <button class="btn-fetch" id="fetchBtn" onclick="fetchData()">Fetch Pairings</button>
      </div>

      <div id="statusBadge" class="status-badge no-data">
        <div class="status-dot"></div>
        <span id="statusText">No Data Loaded</span>
      </div>

      <div id="dataSummary" class="data-summary"></div>

      <p>Ask anything about pairings, duties, or legs:</p>
      <textarea id="questionInput" placeholder="e.g. How many duties are in each base?" disabled></textarea>
      <br />
      <button id="askBtn" onclick="askQuestion()" disabled>Ask Question</button>

      <div class="example-questions" id="exampleQuestions">
        <button class="example-q" onclick="fillQuestion(this)">How many duties in each base?</button>
        <button class="example-q" onclick="fillQuestion(this)">Average block hours per duty by base?</button>
        <button class="example-q" onclick="fillQuestion(this)">Which pairings have 5+ legs in a day?</button>
        <button class="example-q" onclick="fillQuestion(this)">Show all charter pairings</button>
        <button class="example-q" onclick="fillQuestion(this)">Earliest and latest check-in times by base?</button>
        <button class="example-q" onclick="fillQuestion(this)">How many deadhead legs per base?</button>
      </div>

      <div id="output"></div>
    </div>
    <div class="history-section">
      <h2>Query Log</h2>
      <div id="chatHistory"></div>
    </div>
  </div>

  <div class="server-status">
    <div class="server"><div class="server-indicator"></div>RAIDO API</div>
    <div class="server"><div class="server-indicator"></div>CLAUDE AI</div>
    <div class="server"><div class="server-indicator"></div>ANALYZER</div>
  </div>

  <script>
    // Set default dates
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    document.getElementById('startDate').value = todayStr;
    const endDate = new Date(today);
    endDate.setDate(endDate.getDate() + 30);
    document.getElementById('endDate').value = endDate.toISOString().split('T')[0];

    // Check existing data status on load
    (async function checkStatus() {
      try {
        const res = await fetch('/status');
        const status = await res.json();
        if (status.loaded) updateStatusUI(status);
      } catch(e) {}
    })();

    function updateStatusUI(status) {
      const badge = document.getElementById('statusBadge');
      const text = document.getElementById('statusText');
      const summary = document.getElementById('dataSummary');
      const qInput = document.getElementById('questionInput');
      const askBtn = document.getElementById('askBtn');

      if (status.loading) {
        badge.className = 'status-badge loading';
        text.innerHTML = '<span class="spinner"></span>Loading Data...';
        qInput.disabled = true;
        askBtn.disabled = true;
        return;
      }

      if (status.loaded && status.num_pairings > 0) {
        badge.className = 'status-badge loaded';
        text.textContent = 'Data Loaded';
        summary.className = 'data-summary visible';
        summary.innerHTML =
          `<strong>${status.num_pairings}</strong> pairings &middot; ` +
          `<strong>${status.num_duties}</strong> duties &middot; ` +
          `<strong>${status.num_legs}</strong> legs<br>` +
          `Bases: <strong>${status.bases.join(', ')}</strong><br>` +
          `Date range: <strong>${status.date_range}</strong>`;
        qInput.disabled = false;
        askBtn.disabled = false;
      } else if (status.loaded) {
        badge.className = 'status-badge no-data';
        text.textContent = 'No Pairings Found';
        summary.className = 'data-summary';
        qInput.disabled = true;
        askBtn.disabled = true;
      } else {
        badge.className = 'status-badge no-data';
        text.textContent = 'No Data Loaded';
        summary.className = 'data-summary';
        qInput.disabled = true;
        askBtn.disabled = true;
      }
    }

    async function fetchData() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const numDays = document.getElementById('numDays').value;
      const fetchBtn = document.getElementById('fetchBtn');
      const output = document.getElementById('output');

      if (!startDate) {
        output.innerHTML = '<span style="color:#ff6464">Please select a start date.</span>';
        return;
      }

      fetchBtn.disabled = true;
      fetchBtn.innerHTML = '<span class="spinner"></span>Fetching...';
      updateStatusUI({ loading: true });
      output.innerHTML = '<span class="spinner"></span> Fetching pairing data from RAIDO API... This may take a moment.';

      try {
        const body = { start_date: startDate };
        if (endDate) body.end_date = endDate;
        else body.days = parseInt(numDays) || 30;

        const res = await fetch('/fetch-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Fetch failed');
        }

        output.textContent = data.message || 'Data loaded.';
        if (data.status) updateStatusUI(data.status);

      } catch (err) {
        output.innerHTML = `<span style="color:#ff6464">Error: ${err.message}</span>`;
        updateStatusUI({ loaded: false });
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.textContent = 'Fetch Pairings';
      }
    }

    function fillQuestion(btn) {
      const qInput = document.getElementById('questionInput');
      if (!qInput.disabled) {
        qInput.value = btn.textContent;
        qInput.focus();
      }
    }

    document.getElementById('questionInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
      }
    });

    async function askQuestion() {
      const qInput = document.getElementById('questionInput');
      const question = qInput.value.trim();
      if (!question) return;

      const askBtn = document.getElementById('askBtn');
      const output = document.getElementById('output');

      askBtn.disabled = true;
      askBtn.innerHTML = '<span class="spinner"></span>Analyzing...';
      output.innerHTML = '<span class="spinner"></span> Analyzing your question...';

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Query failed');
        }

        const answer = data.answer || 'No answer returned.';
        output.textContent = answer;

        // Add to history
        const historyEntry = document.createElement('div');
        historyEntry.className = 'chat-entry';

        const ts = document.createElement('div');
        ts.className = 'timestamp';
        ts.textContent = new Date().toLocaleTimeString();
        historyEntry.appendChild(ts);

        const cmdDiv = document.createElement('div');
        cmdDiv.className = 'command';
        cmdDiv.textContent = question;
        historyEntry.appendChild(cmdDiv);

        const respDiv = document.createElement('div');
        respDiv.className = 'response';
        respDiv.textContent = answer;
        historyEntry.appendChild(respDiv);

        const chatHistory = document.getElementById('chatHistory');
        chatHistory.insertBefore(historyEntry, chatHistory.firstChild);

        qInput.value = '';

      } catch (err) {
        output.innerHTML = `<span style="color:#ff6464">Error: ${err.message}</span>`;
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = 'Ask Question';
      }
    }

    // Particles
    const particles = document.querySelector('.particles');
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDelay = Math.random() * 20 + 's';
      p.style.animationDuration = 10 + Math.random() * 20 + 's';
      particles.appendChild(p);
    }

    // Flight paths
    const flightPaths = document.querySelector('.flight-paths');
    for (let i = 0; i < 5; i++) {
      const path = document.createElement('div');
      path.className = 'flight-path';
      path.style.top = Math.random() * 100 + '%';
      path.style.width = (50 + Math.random() * 100) + 'px';
      path.style.animationDelay = Math.random() * 8 + 's';
      flightPaths.appendChild(path);
    }

    // Radar blips
    const radar = document.querySelector('.radar');
    setInterval(() => {
      const blip = document.createElement('div');
      blip.style.position = 'absolute';
      blip.style.width = '4px';
      blip.style.height = '4px';
      blip.style.backgroundColor = '#64ffda';
      blip.style.borderRadius = '50%';
      blip.style.left = 20 + Math.random() * 110 + 'px';
      blip.style.top = 20 + Math.random() * 110 + 'px';
      blip.style.animation = 'fadeOut 2s forwards';
      radar.appendChild(blip);
      setTimeout(() => blip.remove(), 2000);
    }, 2000);
  </script>
</body>
</html>
